<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecipeBook</title>

  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">

  <meta property="og:type" content="website">
  <meta property="og:title" content="RecipeBook | Apple Crisp">
  <meta property="og:description" content="A simple yet delicious apple crisp recipe served warm with vanilla ice cream.">
  <meta property="og:url" content="https://yoursiteurl.com">
  <meta property="og:image" content="images/social-preview-image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="RecipeBook | Apple Crisp">
  <meta name="twitter:description" content="A simple yet delicious apple crisp recipe served warm with vanilla ice cream.">
  <meta name="twitter:image" content="images/social-preview-image.png">

  <link rel="icon" href="images/favicon.png">

  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header class="header">
    <div class="logo-area">
      <img src="images/recipe-book.png" alt="Recipe Book Logo">
      <h1>RecipeBook</h1>
    </div>
  </header>

  <section class="search">
    <input type="text" placeholder="Find a recipe">
    <button>
      <img src="images/search-icon.svg" alt="Search">
    </button>
  </section>

  <main class="recipe-container">
    <div class="recipe-card">
      <img src="images/apple-crisp.jpg" alt="Apple Crisp with vanilla ice cream">

      <div class="recipe-content">
        <span class="tag">dessert</span>
        <h2>Apple Crisp</h2>

        <span
          class="rating"
          role="img"
          aria-label="Rating: 4 out of 5 stars"
        >
          <span aria-hidden="true">⭐</span>
          <span aria-hidden="true">⭐</span>
          <span aria-hidden="true">⭐</span>
          <span aria-hidden="true">⭐</span>
          <span aria-hidden="true">☆</span>
        </span>

        <p class="description">
          This apple crisp recipe is a simple yet delicious fall dessert that's
          great served warm with vanilla ice cream.
        </p>
      </div>
    </div>
  </main>

  <footer class="footer">

    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
      Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">
      <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
      <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
      <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>

  </footer>

</body>
</html>
